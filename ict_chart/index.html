<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICT Smart Money Dashboard - CBOT Commodities</title>
  <meta name="description" content="Interactive ICT Smart Money analysis dashboard for CBOT agricultural commodities (Corn, Soybeans, Wheat)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════
       CSS RESET & VARIABLES
       ═══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #060a13;
      --bg-secondary: #0c1220;
      --bg-card: #111827;
      --bg-hover: #1a2540;
      --border: #1e2d4a;
      --border-glow: rgba(0, 210, 255, 0.15);
      --text-primary: #e8ecf4;
      --text-secondary: #8892a4;
      --text-muted: #4a5568;
      --accent: #00d2ff;
      --accent-glow: rgba(0, 210, 255, 0.2);
      --bull: #00dc82;
      --bull-dim: rgba(0, 220, 130, 0.15);
      --bear: #ff4757;
      --bear-dim: rgba(255, 71, 87, 0.15);
      --gold: #ffd700;
      --purple: #a855f7;
      --orange: #ff9f43;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --shadow-glow: 0 0 30px rgba(0, 210, 255, 0.08);
      --font: 'Inter', -apple-system, system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════════════ */
    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      width: 100vw;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: linear-gradient(180deg, rgba(12, 18, 32, 0.98) 0%, rgba(6, 10, 19, 0.95) 100%);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
    }

    .logo-text {
      font-weight: 700;
      font-size: 16px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo-sub {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 3px;
    }

    .tab-btn {
      padding: 8px 24px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }

    .tab-btn:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, rgba(0, 210, 255, 0.15), rgba(168, 85, 247, 0.1));
      color: var(--accent);
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
    }

    /* ── Symbol Info ── */
    .symbol-info {
      text-align: center;
    }

    #symbol-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }

    #symbol-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    /* ── Header Right ── */
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .export-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .export-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.15);
      background: var(--bg-hover);
    }

    /* ═══════════════════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════════════════ */
    .main-content {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      overflow: hidden;
    }

    /* ── Chart Area ── */
    .chart-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── Layer Controls ── */
    .layer-controls {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 6px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .layer-group {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .layer-group:hover {
      background: var(--bg-hover);
    }

    .layer-toggle {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 2px solid var(--text-muted);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      transition: all 0.15s;
    }

    .layer-toggle:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .layer-toggle:checked::after {
      content: '✓';
      position: absolute;
      top: -2px;
      left: 1px;
      font-size: 10px;
      color: #000;
      font-weight: 700;
    }

    .layer-toggle[data-layer="ema"]:checked { background: var(--accent); border-color: var(--accent); }
    .layer-toggle[data-layer="swing"]:checked { background: var(--gold); border-color: var(--gold); }
    .layer-toggle[data-layer="fvg"]:checked { background: var(--bull); border-color: var(--bull); }
    .layer-toggle[data-layer="ob"]:checked { background: var(--orange); border-color: var(--orange); }
    .layer-toggle[data-layer="mss"]:checked { background: var(--purple); border-color: var(--purple); }
    .layer-toggle[data-layer="bottom"]:checked { background: #14b8a6; border-color: #14b8a6; }
    .layer-toggle[data-layer="growth"]:checked { background: #f59e0b; border-color: #f59e0b; }

    .layer-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
    }

    .layer-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }

    /* ── Chart Container ── */
    #chart-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg-primary);
    }

    #main-canvas, #rsi-canvas {
      display: block;
      width: 100%;
      cursor: crosshair;
    }

    #rsi-canvas {
      border-top: 1px solid var(--border);
    }

    /* ═══════════════════════════════════════════════════
       ANALYSIS PANEL (Right Sidebar)
       ═══════════════════════════════════════════════════ */
    .panel-container {
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
    }

    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      z-index: 10;
    }

    .panel-header h2 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }

    #analysis-panel {
      padding: 0;
    }

    .panel-section {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(30, 45, 74, 0.5);
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Price Section ── */
    .current-price {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 8px;
    }

    .price-value {
      font-size: 28px;
      font-weight: 800;
      font-family: var(--mono);
      letter-spacing: -1px;
    }

    .price-value.bull { color: var(--bull); }
    .price-value.bear { color: var(--bear); }
    .price-value.neutral { color: var(--text-primary); }

    .price-change {
      font-size: 13px;
      font-weight: 600;
      font-family: var(--mono);
    }

    .price-change.bull { color: var(--bull); }
    .price-change.bear { color: var(--bear); }
    .price-change.neutral { color: var(--text-secondary); }

    .price-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-muted);
    }

    /* ── Recommendation Badge ── */
    .rec-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .rec-buy {
      background: linear-gradient(135deg, rgba(0, 220, 130, 0.12), rgba(0, 220, 130, 0.05));
      color: var(--bull);
      border: 1px solid rgba(0, 220, 130, 0.3);
      box-shadow: 0 0 20px rgba(0, 220, 130, 0.1);
    }

    .rec-acc {
      background: linear-gradient(135deg, rgba(0, 210, 255, 0.12), rgba(0, 210, 255, 0.05));
      color: var(--accent);
      border: 1px solid rgba(0, 210, 255, 0.3);
      box-shadow: 0 0 20px rgba(0, 210, 255, 0.1);
    }

    .rec-sell {
      background: linear-gradient(135deg, rgba(255, 71, 87, 0.12), rgba(255, 71, 87, 0.05));
      color: var(--bear);
      border: 1px solid rgba(255, 71, 87, 0.3);
      box-shadow: 0 0 20px rgba(255, 71, 87, 0.1);
    }

    .rec-wait {
      background: linear-gradient(135deg, rgba(255, 193, 7, 0.1), rgba(255, 193, 7, 0.03));
      color: var(--gold);
      border: 1px solid rgba(255, 193, 7, 0.2);
    }

    .rec-icon { font-size: 20px; }

    /* ── Event List ── */
    .event-list { display: flex; flex-direction: column; gap: 4px; }

    .event-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-family: var(--mono);
      transition: background 0.15s;
    }

    .event-row:hover { background: var(--bg-hover); }
    .event-row.bullish { color: var(--bull); }
    .event-row.bearish { color: var(--bear); }

    .event-icon { font-size: 12px; width: 16px; text-align: center; }
    .event-label { font-weight: 600; flex: 1; }
    .event-price { font-weight: 500; color: var(--text-primary); }
    .event-time { color: var(--text-muted); font-size: 10px; }

    .no-events {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      padding: 4px 0;
    }

    /* ── Trade Setup Card ── */
    .setup-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-top: 8px;
    }

    .setup-card.long {
      border-left: 3px solid var(--bull);
      background: linear-gradient(90deg, rgba(0, 220, 130, 0.05), transparent);
    }

    .setup-card.short {
      border-left: 3px solid var(--bear);
      background: linear-gradient(90deg, rgba(255, 71, 87, 0.05), transparent);
    }

    .setup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--border);
    }

    .setup-type {
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .long .setup-type { color: var(--bull); }
    .short .setup-type { color: var(--bear); }

    .setup-reason {
      font-size: 11px;
      color: var(--text-secondary);
      font-family: var(--mono);
    }

    .setup-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .setup-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-family: var(--mono);
    }

    .setup-row span { color: var(--text-muted); }
    .setup-row strong { color: var(--text-primary); font-weight: 600; }
    
    .sl-text { color: var(--bear) !important; }
    .tp-text { color: var(--bull) !important; }

    /* ── Score Display ── */
    .score-display {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
    }

    .score-display.strong {
      background: linear-gradient(135deg, rgba(0, 220, 130, 0.1), transparent);
      border: 1px solid rgba(0, 220, 130, 0.2);
    }

    .score-display.moderate {
      background: linear-gradient(135deg, rgba(255, 193, 7, 0.1), transparent);
      border: 1px solid rgba(255, 193, 7, 0.2);
    }

    .score-display.weak {
      background: linear-gradient(135deg, rgba(255, 71, 87, 0.08), transparent);
      border: 1px solid rgba(255, 71, 87, 0.15);
    }

    .score-stars {
      font-size: 14px;
      color: var(--gold);
      letter-spacing: 2px;
    }

    .score-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .score-display.strong .score-label { color: var(--bull); }
    .score-display.moderate .score-label { color: var(--gold); }
    .score-display.weak .score-label { color: var(--bear); }

    .factor-list {
      list-style: none;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .factor-list li {
      padding: 2px 0;
      padding-left: 14px;
      position: relative;
    }

    .factor-list li::before {
      content: '›';
      position: absolute;
      left: 4px;
      color: var(--accent);
      font-weight: 700;
    }

    /* ── Stats Grid ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat {
      text-align: center;
      padding: 8px;
      background: var(--bg-card);
      border-radius: 6px;
      border: 1px solid rgba(30, 45, 74, 0.4);
    }

    .stat-val {
      display: block;
      font-size: 18px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--accent);
    }

    .stat-lbl {
      display: block;
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ═══════════════════════════════════════════════════
       TOOLTIP
       ═══════════════════════════════════════════════════ */
    #tooltip {
      display: none;
      position: fixed;
      z-index: 1000;
      background: rgba(10, 14, 25, 0.96);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      pointer-events: none;
      backdrop-filter: blur(15px);
      box-shadow: var(--shadow), var(--shadow-glow);
      min-width: 200px;
      max-width: 300px;
    }

    .tooltip-header {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      font-family: var(--mono);
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    .tooltip-ohlc {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .tooltip-ohlc .bull { color: var(--bull); }
    .tooltip-ohlc .bear { color: var(--bear); }

    .tooltip-indicators {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-muted);
    }

    .tooltip-events {
      margin-top: 6px;
      padding-top: 4px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tooltip-event {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tooltip-event.bullish {
      background: var(--bull-dim);
      color: var(--bull);
    }

    .tooltip-event.bearish {
      background: var(--bear-dim);
      color: var(--bear);
    }

    /* ═══════════════════════════════════════════════════
       PANEL SCROLLBAR
       ═══════════════════════════════════════════════════ */
    .panel-container::-webkit-scrollbar { width: 6px; }
    .panel-container::-webkit-scrollbar-track { background: transparent; }
    .panel-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    .panel-container::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ═══════════════════════════════════════════════════
       LOADING ANIMATION
       ═══════════════════════════════════════════════════ */
    .panel-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ═══════════════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════════════ */
    @media (max-width: 1100px) {
      .main-content {
        grid-template-columns: 1fr 260px;
      }
    }

    @media (max-width: 850px) {
      .main-content {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
      }
      .panel-container {
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 40vh;
      }
      .header {
        flex-wrap: wrap;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- ═══ HEADER ═══ -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <div class="logo-icon">🔮</div>
          <div>
            <div class="logo-text">ICT Smart Money</div>
            <div class="logo-sub">CBOT Analysis Dashboard</div>
          </div>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-symbol="ZC">ZC</button>
          <button class="tab-btn" data-symbol="ZS">ZS</button>
          <button class="tab-btn" data-symbol="ZW">ZW</button>
        </div>
      </div>

      <div class="symbol-info">
        <div id="symbol-title">Corn (ZC)</div>
        <div id="symbol-subtitle">Loading...</div>
      </div>

      <div class="header-right">
        <button class="export-btn" id="export-btn">
          📸 <span>Export PNG</span>
        </button>
      </div>
    </header>

    <!-- ═══ MAIN CONTENT ═══ -->
    <div class="main-content">
      <!-- Chart Area -->
      <div class="chart-area">
        <!-- Layer Controls -->
        <div class="layer-controls">
          <div class="layer-group">
            <input type="checkbox" class="layer-toggle" data-layer="ema" id="toggle-ema" checked>
            <label class="layer-label" for="toggle-ema">EMA</label>
          </div>
          <div class="layer-group">
            <input type="checkbox" class="layer-toggle" data-layer="swing" id="toggle-swing" checked>
            <label class="layer-label" for="toggle-swing">Swing</label>
          </div>
          <div class="layer-sep"></div>
          <div class="layer-group">
            <input type="checkbox" class="layer-toggle" data-layer="fvg" id="toggle-fvg" checked>
            <label class="layer-label" for="toggle-fvg">FVG</label>
          </div>
          <div class="layer-group">
            <input type="checkbox" class="layer-toggle" data-layer="ob" id="toggle-ob" checked>
            <label class="layer-label" for="toggle-ob">Order Block</label>
          </div>
          <div class="layer-group">
            <input type="checkbox" class="layer-toggle" data-layer="mss" id="toggle-mss" checked>
            <label class="layer-label" for="toggle-mss">MSS</label>
          </div>
          <div class="layer-sep"></div>
          <div class="layer-group">
            <input type="checkbox" class="layer-toggle" data-layer="bottom" id="toggle-bottom" checked>
            <label class="layer-label" for="toggle-bottom">Bottom Zone</label>
          </div>
          <div class="layer-group">
            <input type="checkbox" class="layer-toggle" data-layer="growth" id="toggle-growth" checked>
            <label class="layer-label" for="toggle-growth">Growth</label>
          </div>
        </div>

        <!-- Chart Canvas -->
        <div id="chart-container">
          <canvas id="main-canvas"></canvas>
          <canvas id="rsi-canvas"></canvas>
        </div>
      </div>

      <!-- Analysis Panel -->
